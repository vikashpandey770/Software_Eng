<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Links Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }
    body{
        background:#f4f4f4;
        padding:30px;
    }

    .container{
        max-width:700px;
        margin:auto;
        background:#fff;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,.2);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-top:15px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        width:100%;
        margin-top:20px;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#0056b3;
    }

    #preview{
        margin-top:30px;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:15px;
    }

    .card{
        background:white;
        border-left:5px solid #007bff;
        padding:15px;
        border-radius:8px;
        box-shadow:0 2px 6px rgba(0,0,0,.2);
    }

    .card h3{
        margin-bottom:10px;
    }

    .card a{
        color:#007bff;
        text-decoration:none;
        word-wrap:break-word;
    }
</style>

</head>
<body>

<div class="container">

<h2>Music Links Form</h2>

<form id="musicLinksForm">

<label>Spotify Profile URL</label>
<input type="url" id="spotify" placeholder="https://open.spotify.com/...">

<label>YouTube Music URL</label>
<input type="url" id="youtube" placeholder="https://music.youtube.com/...">

<label>Apple Music URL</label>
<input type="url" id="apple" placeholder="https://music.apple.com/...">

<button type="submit">Submit</button>

</form>

<div id="preview"></div>

</div>


</body>
</html>
